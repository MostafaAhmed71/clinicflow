<style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        @keyframes progress-animation {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .progress-bar-fill {
            animation: progress-animation 3s ease-in-out infinite;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-slow {
            animation: pulseSlow 3s infinite ease-in-out;
        }

        @keyframes pulseSlow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
    </style>
</head>
<body class="bg-background text-on-background flex items-center justify-center min-h-screen">
<!-- Splash Container -->
<main class="relative flex flex-col items-center justify-center w-full h-screen px-md overflow-hidden">
<!-- Background Atmospheric Element (Subtle Gradient/Visual) -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="absolute top-[-20%] right-[-10%] w-[600px] h-[600px] bg-primary-fixed blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] bg-secondary-container blur-[100px] rounded-full"></div>
</div>
<!-- Content Content Area -->
<div class="relative z-10 flex flex-col items-center text-center max-w-lg space-y-lg fade-in-up">
<!-- Logo / Medical Icon Placeholder -->
<div class="mb-lg">
<div class="relative flex items-center justify-center w-32 h-32 md:w-40 md:h-40 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden group">
<!-- The medical icon from the brand's professional context -->
<div class="absolute inset-0 flex items-center justify-center transition-transform duration-700 group-hover:scale-110">
<span class="material-symbols-outlined text-primary text-[64px] md:text-[80px]" style="font-variation-settings: 'FILL' 1;">
                            medical_services
                        </span>
</div>
<!-- Decorative overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent"></div>
</div>
</div>
<!-- Brand Identity -->
<div class="space-y-sm">
<h1 class="font-display text-display text-primary tracking-tight">
                    ClinicFlow
                </h1>
<p class="font-title-lg text-title-lg text-on-surface-variant font-medium">
                    الجيل القادم من إدارة العيادات الذكية
                </p>
</div>
<!-- Loading Area -->
<div class="w-full max-w-[240px] pt-xl">
<!-- Progress Track -->
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="progress-bar-fill h-full bg-primary rounded-full shadow-[0_0_8px_rgba(0,97,148,0.4)]"></div>
</div>
<p class="mt-md font-label-md text-label-md text-outline tracking-wider uppercase opacity-70 pulse-slow">
                    جاري التحميل...
                </p>
</div>
</div>
<!-- Footer Copyright (Optional for Splash) -->
<footer class="absolute bottom-md left-0 right-0 flex justify-center fade-in-up" style="animation-delay: 0.4s;">
<p class="font-label-md text-label-md text-outline">
                © 2024 ClinicFlow. جميع الحقوق محفوظة
            </p>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: Simulate page transition after loading
            // In a real app, this would be tied to asset loading completion
            setTimeout(() => {
                const main = document.querySelector('main');
                // Could trigger an exit animation here if needed
                // main.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            }, 3500);
        });

        // Simple parallax effect on mouse move for the background elements
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.absolute.z-0 > div');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body></html>
